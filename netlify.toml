# Netlify deployment config for LexAid frontend (Vite + React)

[build]
  base    = "client"
  command = "npm run build"
  publish = "dist"

# SPA redirect — all routes go to index.html so React Router works
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
